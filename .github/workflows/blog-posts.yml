name: Latest blog posts
on:
  schedule:
    # Runs every two weeks (1st and 15th of each month at 00:00 UTC)
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://edujbarrios.github.io/blog/index.xml"
          max_post_count: 5
